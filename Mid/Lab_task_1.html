<!DOCTYPE html>
<html>
<head>
<title>Internship Confirmation Form</title>
</head>
<body>
<h1><center>Internship Confirmation Form</center> </h1>
<table>
<tr>
<td>Student Name:</td>
<td><input type="text"></td>
</tr>
<tr>
<td>Email Address:</td>
<td><input type="email"></td>
</tr>
<tr>
<td>Preferred Internship Type:</td>
<td>
<input type="radio" >
On-Site
<input type="radio" >
Remote
</td>
</tr>
<tr>
<td>Internship Duration:</td>
<td>
<select>
<option >6 Weeks</option>
<option >3 Months</option>
</select>
</td>
</tr>
<tr>
<td>Skills of Interest:</td>
<td>
<input type="checkbox" >
Web Development<br>
<input type="checkbox" >
Data Analysis<br>
<input type="checkbox" >
Mobile Apps
</td>
</tr>
<tr>
<td>
<input type="submit" >
</td>
</tr>
</table>
</html>
